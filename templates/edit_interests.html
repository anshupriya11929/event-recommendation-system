<!DOCTYPE html>
<html>

<head>

    <title>Edit Interests</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

{% include 'navbar.html' %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2>
            Edit Interests
        </h2>

        <form method="POST">

            <textarea
                name="interests"
                class="form-control"
                rows="5"
                placeholder="AI, Machine Learning, Robotics"
                required>
            </textarea>

            <button
                class="btn btn-success mt-3">
                Save
            </button>

        </form>

    </div>

</div>

</body>
</html>
