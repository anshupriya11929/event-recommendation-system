<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - Eventify</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
```

</head>

<body
    class="d-flex align-items-center justify-content-center min-vh-100"
    style="background: linear-gradient(135deg, #0d6efd, #6f42c1);">

```
<div class="card shadow-lg border-0 p-4" style="width: 450px;">

    <div class="text-center mb-4">

        <h1>
            🎉 Eventify
        </h1>

        <h3>
            Create Account
        </h3>

        <p class="text-muted">
            Join and discover events tailored for you
        </p>

    </div>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Full Name
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Enter your name"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Email
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Create a password"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-primary w-100">

            Continue

        </button>

    </form>

    <div class="text-center mt-4">

        <p class="mb-0">

            Already have an account?

            <a href="/login">
                Login
            </a>

        </p>

    </div>

</div>
```

</body>

</html>
