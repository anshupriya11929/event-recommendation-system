<!DOCTYPE html>
<html>
    
<head>

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">
    {% include 'navbar.html' %}

<div class="container mt-5">

    <h1>
        Welcome, {{ name }}
    </h1>

    <p class="text-muted">
        Interests: {{ interests }}
    </p>

    <hr>

    <h3>
        Recommended Events
    </h3>

    <div class="row">

        {% for event in events %}

        <div class="col-md-6 mb-4">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h5>
                        {{ event.event_name }}
                    </h5>

                    <span class="badge bg-primary">
                        {{ event.category }}
                    </span>

                    <p class="mt-2">
                        {{ event.description }}
                    </p>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
