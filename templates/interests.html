<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Select Interests - Eventify</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        .interest-card {
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid #dee2e6;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            font-weight: 600;
        }

        .interest-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .interest-card input {
            display: none;
        }

        .interest-card.selected {
            background-color: #0d6efd;
            color: white;
            border-color: #0d6efd;
        }

    </style>

</head>

<body
    class="d-flex align-items-center justify-content-center min-vh-100"
    style="background: linear-gradient(135deg, #0d6efd, #6f42c1);">

<div class="container">

    <div class="card shadow-lg border-0 p-4">

        <div class="text-center mb-4">

            <h1>🎉 Eventify</h1>

            <h3>Select Your Interests</h3>

            <p class="text-muted">
                Choose the topics you are interested in
            </p>

        </div>

        <form method="POST">

            <div class="row g-3">

                <div class="col-md-4">
                    <label class="interest-card">
                        <input type="checkbox" name="interests" value="Artificial Intelligence">
                        🤖 Artificial Intelligence
                    </label>
                </div>

                <div class="col-md-4">
                    <label class="interest-card">
                        <input type="checkbox" name="interests" value="Machine Learning">
                        🧠 Machine Learning
                    </label>
                </div>

                <div class="col-md-4">
                    <label class="interest-card">
                        <input type="checkbox" name="interests" value="Data Science">
                        📊 Data Science
                    </label>
                </div>

                <div class="col-md-4">
                    <label class="interest-card">
                        <input type="checkbox" name="interests" value="Sports">
                        ⚽ Sports
                    </label>
                </div>

                <div class="col-md-4">
                    <label class="interest-card">
                        <input type="checkbox" name="interests" value="Entrepreneurship">
                        🚀 Entrepreneurship
                    </label>
                </div>

                <div class="col-md-4">
                    <label class="interest-card">
                        <input type="checkbox" name="interests" value="Research">
                        🔬 Research
                    </label>
                </div>

                <div class="col-md-4">
                    <label class="interest-card">
                        <input type="checkbox" name="interests" value="Music">
                        🎵 Music
                    </label>
                </div>

                <div class="col-md-4">
                    <label class="interest-card">
                        <input type="checkbox" name="interests" value="Photography">
                        📸 Photography
                    </label>
                </div>

                <div class="col-md-4">
                    <label class="interest-card">
                        <input type="checkbox" name="interests" value="Programming">
                        💻 Programming
                    </label>
                </div>

            </div>

            <div class="text-center mt-5">

                <button
                    type="submit"
                    class="btn btn-primary btn-lg px-5">

                    Continue

                </button>

            </div>

        </form>

    </div>

</div>

<script>

const cards = document.querySelectorAll(".interest-card");

cards.forEach(card => {

    card.addEventListener("click", function() {

        this.classList.toggle("selected");

    });

});

</script>

</body>
</html>
