<!DOCTYPE html>
<html>

<head>

    <title>Recommendations</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">
        Recommended Events
    </h1>

    <h5 class="text-muted mb-4">
        Interest: {{ interest }}
    </h5>

    <div class="row">

        {% for event in events %}

        <div class="col-md-6 mb-4">

            <div class="card shadow-sm h-100">

                <div class="card-body">

                    <h4 class="card-title">
                        {{ event.event_name }}
                    </h4>

                    <span class="badge bg-primary mb-2">
                        {{ event.category }}
                    </span>

                    <p class="card-text">
                        {{ event.description }}
                    </p>

                    <p class="text-muted">
                        📍 {{ event.location }}
                    </p>

                    <p class="text-muted">
                        📅 {{ event.date }}
                    </p>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

    <a href="/" class="btn btn-secondary">
        Back
    </a>

</div>

</body>

</html>
