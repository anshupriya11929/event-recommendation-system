<!DOCTYPE html>
<html>

<head>

    <title>Saved Events</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

{% include 'navbar.html' %}

<div class="container py-5">

    <h1 class="fw-bold mb-4">
        ❤️ Saved Events
    </h1>

    {% if events %}

    <div class="row">

        {% for event in events %}

        <div class="col-md-4 mb-4">

            <div class="card shadow-sm h-100">

                <div class="card-body">

                    <h5>
                        {{ event.event_name }}
                    </h5>

                    <span class="badge bg-primary">
                        {{ event.category }}
                    </span>

                    <p class="mt-3">
                        {{ event.description }}
                    </p>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

    {% else %}

    <div class="alert alert-info">

        No saved events yet.

    </div>

    {% endif %}

</div>

</body>

</html>
